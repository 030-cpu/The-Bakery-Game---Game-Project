<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> The Bakery game </title>
    <link rel="stylesheet" href="bakery.css">
</head>
<body>
    <!-- Heading -->
    <div class="heading">
        <h1 id="title"> The Bakery </h1>
        <p id="subtitle"> welcome to the bakery, bake treats to serve customers!</p>
    </div>

    <div class="container">
        <!-- Customer Area -->
            <div class="customer-area">
                         <div class="title-text"> Customers </div>
                <div class="sub-customer-area">
                    <div class="customer-box">
                            <div> 🧑 </div>
                            <div> Name </div>
                            <div> I would like...</div>
                            <div> Displays The Items They Want</div>
                            <button> Give The Items to the Customer</button>
                    </div>
                </div>
            </div>

        <!-- Treats Area -->
            <div class="treat-area">
                    <div class="title-text"> Treats </div>
                <div class="sub-treat-area">
                    <div class="treat-box">
                        <div class="treat">
                            🍬
                        </div>
                        <div>Candy</div>
                        <button>5$</button>
                    </div>

                    <div class="treat-box">
                        <div class="treat">
                            🍭
                        </div>
                        <div>Lolipop</div>
                        <button>25$</button>
                        
                    </div>

                    <div class="treat-box">
                        <div class="treat">
                            🍫
                        </div>
                        <div>Chocolate</div>
                        <button>50$</button>
                    </div>

                    <div class="treat-box">
                        <div class="treat">
                            🍪
                        </div>
                        <div>Cookie</div>
                        <button>100$</button>
                    </div>

                    <div class="treat-box">
                        <div class="treat">
                            🍰
                        </div>
                        <div>Strawberry Shortcake</div>
                        <button>250$</button>
                    </div>

                    <div class="treat-box">
                        <div class="treat">
                            🎂
                        </div>
                        <div> Birthday Cake </div>
                        <button>500$</button>
                    </div>
                </div>
            </div>
            
        <!-- Ingredients Area-->
            <div class="ingredient-area">
                    <div class="title-text"> Ingredient </div>
                <div class="sub-ingredient-area">
                        <div class="ingredient">🧈</div>
                        <div class="ingredient">🥚</div>
                        <div class="ingredient">🥛</div>
                        <div class="ingredient"></div>
                        <div class="ingredient">🍓</div>
                        <div class="ingredient">🍽️</div>
                </div>
            </div>
    </div>
    <script src="bakery.js"></script>
</body>
</html>
